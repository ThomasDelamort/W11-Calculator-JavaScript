<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 11 Calculator</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="calculator">
        <div id="emptySpace"></div>
        <input id="display" placeholder="0" readonly>
        <div id="keys">
            <button class="darkgrey">%</button>
            <button class="darkgrey">CE</button>
            <button class="darkgrey">C</button>
            <button class="darkgrey">⌫</button>
            <button class="darkgrey">1/x</button>
            <button class="darkgrey">x²</button>
            <button class="darkgrey">²√x</button>
            <button class="darkgrey operators">÷</button>

            <button class="lightgrey numbers">7</button>
            <button class="lightgrey numbers">8</button>
            <button class="lightgrey numbers">9</button>

            <button class="darkgrey operators">×</button>

            <button class="lightgrey numbers">4</button>
            <button class="lightgrey numbers">5</button>
            <button class="lightgrey numbers">6</button>

            <button class="darkgrey operators">−</button>

            <button class="lightgrey numbers">1</button>
            <button class="lightgrey numbers">2</button>
            <button class="lightgrey numbers">3</button>

            <button class="darkgrey operators">+</button>

            <button class="lightgrey">±</button>
            <button class="lightgrey numbers">0</button>
            <button class="lightgrey">.</button>
            <button class="equals">=</button>
        </div>
    </div>

    <script src="./index.js"></script>
</body>
</html>
